# flutter pub run flutter_launcher_icons
flutter_launcher_icons:
  image_path: "assets/tidal/icon/app-icon.png"

  android: "launcher_icon"
  # image_path_android: "assets/icon/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/tidal/icon/app-icon-transparent.png"
  adaptive_icon_monochrome: "assets/tidal/icon/app-icon-transparent.png"
  adaptive_icon_foreground_inset: 14

  ios: true
  image_path_ios: "assets/tidal/icon/app-icon.png"
  remove_alpha_ios: true
  image_path_ios_dark_transparent: "assets/tidal/icon/app-icon-transparent.png"
  image_path_ios_tinted_grayscale: "assets/tidal/icon/app-icon-transparent.png"
  background_color_ios: "#000000"

  web:
    generate: false

  windows:
    generate: false

  macos:
    generate: false
